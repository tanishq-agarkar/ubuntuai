
<!DOCTYPE html>

<html>

<head>

    <title>Ubuntu AI Dashboard</title>

    <style>

        body { background: #12131a; color: #e2e8f0; font-family: sans-serif; padding: 24px; }

        #chat { border: 1px solid #2a2d3a; height: 400px; overflow-y: auto; padding: 12px; margin-bottom: 12px; background: #1a1d27; }

        input { width: 80%; padding: 10px; background: #0f1117; color: white; border: 1px solid #2a2d3a; }

        button { padding: 10px 20px; background: #7c6af7; color: white; border: none; cursor: pointer; }

        pre { background: #0f1117; padding: 8px; color: #5eead4; }

    </style>

</head>

<body>

    <h1>Local AI System Dashboard</h1>

    <div id="chat"></div>

    <input id="inp" placeholder="Ask system command..."><button onclick="send()">Send</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>

    <script>

        const socket = io(), chat = document.getElementById('chat'), inp = document.getElementById('inp');

        function send() { socket.emit('message', {text: inp.value}); inp.value=''; }

        socket.on('plan', d => {

            chat.innerHTML += `<div><strong>Plan:</strong> ${d.explanation} <code>${d.command}</code> <button onclick="run('${d.command}', '${d.original_request}')">Execute</button></div>`;

        });

        socket.on('response', d => {

            chat.innerHTML += `<div><strong>Res:</strong> ${d.text}</div>`;

            if(d.stdout) chat.innerHTML += `<pre>${d.stdout}</pre>`;

        });

        function run(c, o) { socket.emit('message', {text: o, confirmed: true, pending_command: c}); }

    </script>

</body>

</html>
